name: Update Mark Six results

on:
  schedule:
    - cron: '30 14 * * *'   # daily ~22:30 Hong Kong time (14:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-marksix
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scrape latest results
        run: node scripts/scrape.mjs
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "data: update Mark Six results ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No new draws."
          fi
